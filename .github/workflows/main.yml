name: GitHub Stars Crawler

on:
  workflow_dispatch: # 支持在 GitHub 网页上手动点击“Run workflow”启动

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      issues: read
      pull-requests: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler
        env:
          # 优先使用用户配置的独立账号多 Token 密匙 (MY_GITHUB_TOKENS)，其次退避使用 Actions 默认 Token
          GITHUB_TOKENS: ${{ secrets.MY_GITHUB_TOKENS || secrets.GITHUB_TOKEN }}
        run: |
          # 启动后台自动提交守护进程，每 30 分钟提交一次数据，双重保险防强杀
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          (
            while true; do
              sleep 1800
              echo "=== 启动 30分钟 自动进度备份 ==="
              git add data_phase1_full/
              git commit -m "自动备份最新爬取进度 [skip ci]" && git push || echo "当前无新数据可备份"
            done
          ) &
          AUTO_COMMIT_PID=$!
          
          # 运行爬虫
          python crawler.py
          
          # 运行结束后终止后台进程
          kill $AUTO_COMMIT_PID || true

      - name: Upload Crawled Data
        uses: actions/upload-artifact@v4
        if: always() # 无论成功还是失败，都上传已下载的数据
        with:
          name: crawled-data-artifact
          path: data_phase1_full/

      - name: Commit and Push Progress
        if: always() # 无论正常结束还是由于5.5小时超时安全退出，都提交保存进度
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_phase1_full/
          git commit -m "保存爬虫数据与断点状态 [skip ci]" || echo "没有检测到任何更新"
          git push
