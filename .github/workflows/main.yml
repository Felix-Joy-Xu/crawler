name: GitHub Stars Crawler

on:
  workflow_dispatch: # 支持在 GitHub 网页上手动点击“Run workflow”启动

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    # 授予工作流所需的权限
    permissions:
      contents: write
      issues: read
      pull-requests: read
      discussions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler
        env:
          # 自动注入 GitHub Actions 提供的内置免限流 Token (只适用于公共仓库数据)
          GITHUB_TOKENS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python crawler.py

      - name: Upload Crawled Data
        uses: actions/upload-artifact@v4
        if: always() # 无论成功还是失败，都上传已下载的数据
        with:
          name: crawled-data-artifact
          path: data_phase1_full/
